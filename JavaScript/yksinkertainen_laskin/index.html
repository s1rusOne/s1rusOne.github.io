<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laskin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-wrapper">
        <div class="calc-card">

            <div class="calc-header">
                <span class="calc-icon"><i class="bi bi-calculator-fill"></i></span>
                <span class="calc-title">Laskin</span>
                <span class="info-icon" id="info-btn" title="Tietoa laskimesta"><i class="bi bi-info-circle"></i></span>
            </div>

            <div class="calc-inputs">
                <div class="number-group">
                    <button class="step-btn" onclick="stepNumber('a', -1)">-</button>
                    <input type="text" id="numA" class="num-field" value="">
                    <button class="step-btn" onclick="stepNumber('a', 1)">+</button>
                </div>

                <select id="operationSelect" class="op-select">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">×</option>
                    <option value="/">/</option>
                </select>

                <div class="number-group">
                    <button class="step-btn" onclick="stepNumber('b', -1)">-</button>
                    <input type="text" id="numB" class="num-field" value="">
                    <button class="step-btn" onclick="stepNumber('b', 1)">+</button>
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">Laske</button>

            <div class="result-box" id="result-box">
                <span id="result-value">—</span>
            </div>

            <div class="history-box" id="history-box"></div>
        </div>
    </div>

    <div id="error-dialog" title="Virhe" style="display:none;">
        <p id="error-message"></p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
