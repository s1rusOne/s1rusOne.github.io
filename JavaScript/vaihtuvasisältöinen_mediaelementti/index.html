<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kissagalleria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carousel-wrapper">
        <div class="carousel-card">
            <img id="cat-img" src="" alt="">
            <div class="cat-label" id="cat-name"></div>
        </div>
        <div class="btn-group">
            <button class="ctrl-btn" onclick="prevSlide(); resetTimer()"><i class="bi bi-chevron-left"></i></button>
            <button class="ctrl-btn" id="play-btn" onclick="togglePlay()"><i class="bi bi-stop-fill"></i></button>
            <button class="ctrl-btn" onclick="nextSlide(); resetTimer()"><i class="bi bi-chevron-right"></i></button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
