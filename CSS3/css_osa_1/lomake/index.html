<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="lomake.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="page-wrapper">

        <header class="form-header">
            <h1 class="form-title">Contact Us</h1>
            <p class="form-subtitle">Fill in the form below and we will get back to you shortly.</p>
        </header>

        <form action="#" method="post" class="contact-form">

            <fieldset class="form-fieldset">
                <legend class="form-legend">Contact information</legend>

                <div class="form-columns">

                    <div class="form-column">
                        <div class="form-group">
                            <label for="firstname" class="form-label">First name</label>
                            <input type="text" id="firstname" name="firstname" class="form-input" placeholder="John">
                        </div>

                        <div class="form-group">
                            <label for="lastname" class="form-label">Last name</label>
                            <input type="text" id="lastname" name="lastname" class="form-input" placeholder="Doe">
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="john.doe@example.com">
                        </div>

                        <div class="form-group">
                            <label for="telephone" class="form-label">Telephone</label>
                            <input type="tel" id="telephone" name="telephone" class="form-input" placeholder="+358 40 123 4567">
                        </div>
                    </div>

                    <div class="form-column form-column--contact-method">
                        <div class="contact-method-box">
                            <span class="contact-method-title">Preferred contact method</span>
                            <div class="checkbox-group">
                                <input type="checkbox" id="contact_email" name="contact_method" value="email" class="checkbox-input">
                                <label for="contact_email" class="checkbox-label">Email</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="contact_telephone" name="contact_method" value="telephone" class="checkbox-input">
                                <label for="contact_telephone" class="checkbox-label">Telephone</label>
                            </div>
                        </div>
                    </div>

                </div>
            </fieldset>

            <fieldset class="form-fieldset">
                <legend class="form-legend">Feedback</legend>

                <div class="form-group">
                    <label for="subject" class="form-label">Message subject</label>
                    <input type="text" id="subject" name="subject" class="form-input" placeholder="What is your message about?">
                </div>

                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" rows="7" class="form-textarea" placeholder="Write your message here..."></textarea>
                </div>

                <div class="form-group">
                    <label for="attachment" class="form-label">Attach a file</label>
                    <input type="file" id="attachment" name="attachment" class="form-file">
                </div>

                <div class="form-submit">
                    <button type="submit" class="submit-btn">Send message</button>
                </div>

            </fieldset>

        </form>

    </div>

</body>

</html>
