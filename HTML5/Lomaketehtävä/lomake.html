<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>

<body>

    <form action="#" method="post">

        <fieldset>
            <legend>Contact information:</legend>
            <table>
                <tr>
                    <td><label for="firstname">First name:</label></td>
                    <td><input type="text" id="firstname" name="firstname" size="22"></td>
                    <td colspan="2"><b>Preferred contact method:</b></td>
                </tr>
                <tr>
                    <td><label for="lastname">Last name:</label></td>
                    <td><input type="text" id="lastname" name="lastname" size="22"></td>
                    <td><input type="checkbox" id="contact_email" name="contact_method" value="email"></td>
                    <td><label for="contact_email">Email</label></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" size="22"></td>
                    <td><input type="checkbox" id="contact_telephone" name="contact_method" value="telephone"></td>
                    <td><label for="contact_telephone">Telephone</label></td>
                </tr>
                <tr>
                    <td><label for="telephone">Telephone:</label></td>
                    <td><input type="tel" id="telephone" name="telephone" size="22"></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </fieldset>

        <fieldset>
            <legend>Feedback:</legend>
            <table>
                <tr>
                    <td><label for="subject">Message subject:</label></td>
                    <td><input type="text" id="subject" name="subject" size="22"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <textarea id="message" name="message" rows="9" cols="50"></textarea>
                    </td>
                </tr>
                <tr>
                    <td><label for="attachment">Attach a file:</label></td>
                    <td><input type="file" id="attachment" name="attachment"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" value="Send">
                    </td>
                </tr>
            </table>
        </fieldset>

    </form>

</body>

</html>
